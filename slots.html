<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Slots — BunzyBets Gaming</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700;900&family=Exo+2:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --void: #03020a; --deep: #080618; --accent-gold: #f5c842; --accent-cyan: #00e5ff;
    --accent-magenta: #e040fb; --star-white: #e8f0ff; --dim: #6a7a9a;
    --card-bg: rgba(255,255,255,0.04); --card-border: rgba(255,255,255,0.08);
    --glow-gold: 0 0 20px rgba(245,200,66,0.4);
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:var(--void); color:var(--star-white); font-family:'Exo 2',sans-serif; min-height:100vh; }
  #starfield { position:fixed; inset:0; z-index:0; pointer-events:none;
    background: radial-gradient(ellipse at 20% 50%, #0d0830 0%, transparent 60%), radial-gradient(ellipse at 80% 20%, #080d30 0%, transparent 50%), var(--void); }
  .star { position:absolute; border-radius:50%; background:white; animation:twinkle var(--d) ease-in-out infinite; }
  @keyframes twinkle { 0%,100%{opacity:var(--min);transform:scale(1)} 50%{opacity:1;transform:scale(1.3)} }
  nav { position:fixed; top:0; left:0; right:0; z-index:100; display:flex; align-items:center; justify-content:space-between; padding:16px 40px;
    background:rgba(3,2,10,0.8); backdrop-filter:blur(20px); border-bottom:1px solid rgba(0,229,255,0.1); }
  .nav-logo { font-family:'Orbitron',sans-serif; font-weight:900; font-size:1.2rem; color:var(--accent-gold); text-decoration:none; letter-spacing:2px; }
  .nav-logo span { color:var(--accent-cyan); }
  .nav-balance { display:flex; align-items:center; gap:8px; font-family:'JetBrains Mono',monospace; font-size:0.9rem; color:var(--accent-gold);
    background:rgba(245,200,66,0.08); border:1px solid rgba(245,200,66,0.2); padding:8px 16px; border-radius:8px; }
  .nav-balance .label { color:var(--dim); font-size:0.75rem; }
  .back-btn { font-family:'Orbitron',sans-serif; font-size:0.75rem; letter-spacing:2px; padding:8px 16px; border-radius:6px;
    background:transparent; color:var(--dim); border:1px solid var(--card-border); text-decoration:none; transition:all 0.2s; }
  .back-btn:hover { color:var(--star-white); border-color:rgba(255,255,255,0.3); }
  .game-wrap { position:relative; z-index:1; display:flex; flex-direction:column; align-items:center; justify-content:center;
    min-height:100vh; padding:100px 20px 40px; }
  .game-title { font-family:'Orbitron',sans-serif; font-size:1.8rem; font-weight:700; color:var(--accent-gold); margin-bottom:8px; letter-spacing:3px; }
  .game-sub { color:var(--dim); font-size:0.85rem; margin-bottom:40px; letter-spacing:1px; }
  .slot-machine { background:var(--card-bg); border:1px solid rgba(245,200,66,0.2); border-radius:20px; padding:40px;
    max-width:600px; width:100%; box-shadow:0 0 60px rgba(245,200,66,0.1); }
  .reels { display:flex; gap:12px; justify-content:center; margin-bottom:30px; }
  .reel { width:100px; height:120px; background:rgba(0,0,0,0.4); border:1px solid var(--card-border); border-radius:12px;
    display:flex; align-items:center; justify-content:center; font-size:3rem; overflow:hidden; position:relative; }
  .reel-inner { display:flex; flex-direction:column; align-items:center; transition:transform 0.1s; }
  .reel-symbol { height:120px; display:flex; align-items:center; justify-content:center; font-size:3rem; }
  .spinning .reel-inner { animation:spin-reel 0.1s linear infinite; }
  @keyframes spin-reel { from{transform:translateY(0)} to{transform:translateY(-120px)} }
  .paylines { display:flex; justify-content:center; gap:8px; margin-bottom:20px; flex-wrap:wrap; }
  .payline-info { font-family:'JetBrains Mono',monospace; font-size:0.65rem; color:var(--dim); padding:4px 10px;
    border:1px solid var(--card-border); border-radius:4px; }
  .result-msg { text-align:center; min-height:40px; margin-bottom:20px; font-family:'Orbitron',sans-serif;
    font-size:1.1rem; font-weight:700; color:var(--accent-gold); }
  .result-msg.win { color:var(--accent-gold); text-shadow:var(--glow-gold); animation:pulse 0.5s ease; }
  .result-msg.lose { color:var(--dim); }
  @keyframes pulse { 0%,100%{transform:scale(1)} 50%{transform:scale(1.1)} }
  .controls { display:flex; gap:12px; align-items:center; justify-content:center; flex-wrap:wrap; }
  .bet-control { display:flex; align-items:center; gap:8px; }
  .bet-label { font-size:0.75rem; color:var(--dim); letter-spacing:1px; }
  .bet-btn { width:32px; height:32px; border-radius:6px; border:1px solid var(--card-border); background:var(--card-bg);
    color:var(--star-white); cursor:pointer; font-size:1rem; transition:all 0.2s; }
  .bet-btn:hover { border-color:var(--accent-gold); color:var(--accent-gold); }
  .bet-amount { font-family:'JetBrains Mono',monospace; font-size:1rem; color:var(--accent-gold);
    background:rgba(245,200,66,0.08); border:1px solid rgba(245,200,66,0.2); padding:6px 16px; border-radius:6px; min-width:80px; text-align:center; }
  .spin-btn { font-family:'Orbitron',sans-serif; font-size:0.9rem; font-weight:700; letter-spacing:2px;
    padding:14px 40px; border-radius:8px; border:none; cursor:pointer;
    background:linear-gradient(135deg,var(--accent-gold),#e6a800); color:#000; transition:all 0.2s; box-shadow:var(--glow-gold); }
  .spin-btn:hover:not(:disabled) { transform:translateY(-2px); box-shadow:0 0 40px rgba(245,200,66,0.6); }
  .spin-btn:disabled { opacity:0.5; cursor:not-allowed; transform:none; }
  .paytable { margin-top:30px; border-top:1px solid var(--card-border); padding-top:20px; }
  .paytable-title { font-family:'Orbitron',sans-serif; font-size:0.75rem; letter-spacing:2px; color:var(--dim); margin-bottom:12px; text-align:center; }
  .paytable-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:8px; }
  .pay-item { display:flex; align-items:center; gap:8px; font-size:0.8rem; color:var(--dim);
    background:rgba(255,255,255,0.02); padding:8px; border-radius:6px; }
  .pay-symbol { font-size:1.2rem; }
  .pay-mult { font-family:'JetBrains Mono',monospace; color:var(--accent-gold); font-size:0.75rem; }
  .low-balance-btn { font-family:'Orbitron',sans-serif; font-size:0.7rem; letter-spacing:1px; padding:6px 14px;
    border-radius:6px; border:1px solid rgba(245,200,66,0.3); background:transparent; color:var(--accent-gold); cursor:pointer; transition:all 0.2s; }
  .low-balance-btn:hover { background:rgba(245,200,66,0.1); }
</style>
</head>
<body>
<div id="starfield"></div>
<nav>
  <a href="index.html" class="nav-logo">BUNZY<span>BETS</span></a>
  <div style="display:flex;gap:12px;align-items:center;">
    <a href="index.html" class="back-btn">← LOBBY</a>
    <div class="nav-balance"><span class="label">CREDITS</span><span id="nav-balance">$10,000.00</span></div>
  </div>
</nav>

<div class="game-wrap">
  <div class="game-title">SLOTS</div>
  <div class="game-sub">Match 3 symbols across the reels to win</div>
  <div class="slot-machine">
    <div class="reels">
      <div class="reel" id="reel0"><div class="reel-inner"><div class="reel-symbol">🌟</div></div></div>
      <div class="reel" id="reel1"><div class="reel-inner"><div class="reel-symbol">💎</div></div></div>
      <div class="reel" id="reel2"><div class="reel-inner"><div class="reel-symbol">🚀</div></div></div>
      <div class="reel" id="reel3"><div class="reel-inner"><div class="reel-symbol">🌙</div></div></div>
      <div class="reel" id="reel4"><div class="reel-inner"><div class="reel-symbol">⭐</div></div></div>
    </div>
    <div class="result-msg" id="result-msg">Place your bet and spin!</div>
    <div class="controls">
      <div class="bet-control">
        <span class="bet-label">BET</span>
        <button class="bet-btn" onclick="changeBet(-10)">−</button>
        <div class="bet-amount" id="bet-display">$10</div>
        <button class="bet-btn" onclick="changeBet(10)">+</button>
      </div>
      <button class="spin-btn" id="spin-btn" onclick="spin()">SPIN</button>
      <button class="low-balance-btn" onclick="topUp()" id="topup-btn" style="display:none">TOP UP</button>
    </div>
    <div class="paytable">
      <div class="paytable-title">PAYTABLE — 3+ MATCHES</div>
      <div class="paytable-grid">
        <div class="pay-item"><span class="pay-symbol">💎</span><span class="pay-mult">×50</span></div>
        <div class="pay-item"><span class="pay-symbol">🚀</span><span class="pay-mult">×20</span></div>
        <div class="pay-item"><span class="pay-symbol">🌟</span><span class="pay-mult">×15</span></div>
        <div class="pay-item"><span class="pay-symbol">👾</span><span class="pay-mult">×10</span></div>
        <div class="pay-item"><span class="pay-symbol">🌙</span><span class="pay-mult">×8</span></div>
        <div class="pay-item"><span class="pay-symbol">⭐</span><span class="pay-mult">×5</span></div>
        <div class="pay-item"><span class="pay-symbol">🪐</span><span class="pay-mult">×4</span></div>
        <div class="pay-item"><span class="pay-symbol">☄️</span><span class="pay-mult">×3</span></div>
        <div class="pay-item"><span class="pay-symbol">🌌</span><span class="pay-mult">×2</span></div>
      </div>
    </div>
  </div>
</div>

<script>
  const SYMBOLS = ['💎','🚀','🌟','👾','🌙','⭐','🪐','☄️','🌌'];
  const WEIGHTS = [2,4,6,8,10,14,16,18,20]; // lower = rarer
  const MULTIPLIERS = { '💎':50,'🚀':20,'🌟':15,'👾':10,'🌙':8,'⭐':5,'🪐':4,'☄️':3,'🌌':2 };

  let bet = 10;
  let spinning = false;

  // Stars
  const sf = document.getElementById('starfield');
  for(let i=0;i<150;i++){
    const s=document.createElement('div'); s.className='star';
    const size=Math.random()*2+0.5, min=Math.random()*0.3+0.1;
    s.style.cssText=`width:${size}px;height:${size}px;left:${Math.random()*100}%;top:${Math.random()*100}%;--d:${Math.random()*4+2}s;--min:${min};animation-delay:${Math.random()*4}s;`;
    sf.appendChild(s);
  }

  function getBalance() { return parseFloat(localStorage.getItem('bunzy_balance') || 10000); }
  function setBalance(v) {
    localStorage.setItem('bunzy_balance', v.toFixed(2));
    document.getElementById('nav-balance').textContent = '$' + v.toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2});
    document.getElementById('topup-btn').style.display = v < 10 ? 'block' : 'none';
  }

  function changeBet(delta) {
    if(spinning) return;
    bet = Math.max(1, Math.min(1000, bet + delta));
    document.getElementById('bet-display').textContent = '$' + bet;
  }

  function weightedRandom() {
    const total = WEIGHTS.reduce((a,b)=>a+b,0);
    let r = Math.random() * total;
    for(let i=0;i<SYMBOLS.length;i++) { r-=WEIGHTS[i]; if(r<=0) return SYMBOLS[i]; }
    return SYMBOLS[SYMBOLS.length-1];
  }

  function spin() {
    if(spinning) return;
    const bal = getBalance();
    if(bal < bet) { document.getElementById('result-msg').textContent = 'Not enough credits!'; document.getElementById('result-msg').className='result-msg lose'; return; }
    setBalance(bal - bet);
    spinning = true;
    document.getElementById('spin-btn').disabled = true;
    document.getElementById('result-msg').textContent = '';
    document.getElementById('result-msg').className = 'result-msg';

    // Animate reels
    const reels = [0,1,2,3,4];
    reels.forEach(i => document.getElementById('reel'+i).classList.add('spinning'));

    const results = reels.map(() => weightedRandom());

    reels.forEach((i, idx) => {
      setTimeout(() => {
        document.getElementById('reel'+i).classList.remove('spinning');
        document.getElementById('reel'+i).querySelector('.reel-symbol').textContent = results[i];
        if(idx === reels.length-1) {
          setTimeout(() => showResult(results), 100);
        }
      }, 400 + idx * 200);
    });
  }

  function showResult(results) {
    // Count symbol frequencies
    const counts = {};
    results.forEach(s => counts[s] = (counts[s]||0)+1);
    let bestMult = 0, bestSymbol = '';
    for(const [sym, count] of Object.entries(counts)) {
      if(count >= 3) {
        const m = MULTIPLIERS[sym] * (count === 4 ? 2 : count === 5 ? 5 : 1);
        if(m > bestMult) { bestMult = m; bestSymbol = sym; }
      }
    }
    const msg = document.getElementById('result-msg');
    if(bestMult > 0) {
      const win = bet * bestMult;
      setBalance(getBalance() + win);
      msg.textContent = `${bestSymbol} WIN! +$${win.toLocaleString()}`;
      msg.className = 'result-msg win';
    } else {
      msg.textContent = 'No match. Try again!';
      msg.className = 'result-msg lose';
    }
    spinning = false;
    document.getElementById('spin-btn').disabled = false;
  }

  function topUp() { setBalance(getBalance() + 1000); document.getElementById('result-msg').textContent = '+$1,000 credits added!'; document.getElementById('result-msg').className='result-msg win'; }

  setBalance(getBalance());
</script>
</body>
</html>
