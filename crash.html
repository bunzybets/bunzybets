<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Crash — BunzyBets Gaming</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700;900&family=Exo+2:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{--void:#03020a;--accent-gold:#f5c842;--accent-cyan:#00e5ff;--accent-red:#ff4444;--star-white:#e8f0ff;--dim:#6a7a9a;--card-bg:rgba(255,255,255,0.04);--card-border:rgba(255,255,255,0.08);}
  *{margin:0;padding:0;box-sizing:border-box;}
  body{background:var(--void);color:var(--star-white);font-family:'Exo 2',sans-serif;min-height:100vh;}
  #starfield{position:fixed;inset:0;z-index:0;pointer-events:none;background:radial-gradient(ellipse at 50% 30%,#1a0008 0%,transparent 60%),var(--void);}
  .star{position:absolute;border-radius:50%;background:white;animation:twinkle var(--d) ease-in-out infinite;}
  @keyframes twinkle{0%,100%{opacity:var(--min)}50%{opacity:1}}
  nav{position:fixed;top:0;left:0;right:0;z-index:100;display:flex;align-items:center;justify-content:space-between;padding:16px 40px;background:rgba(3,2,10,0.8);backdrop-filter:blur(20px);border-bottom:1px solid rgba(0,229,255,0.1);}
  .nav-logo{font-family:'Orbitron',sans-serif;font-weight:900;font-size:1.2rem;color:var(--accent-gold);text-decoration:none;letter-spacing:2px;}
  .nav-logo span{color:var(--accent-cyan);}
  .nav-balance{display:flex;align-items:center;gap:8px;font-family:'JetBrains Mono',monospace;font-size:0.9rem;color:var(--accent-gold);background:rgba(245,200,66,0.08);border:1px solid rgba(245,200,66,0.2);padding:8px 16px;border-radius:8px;}
  .nav-balance .label{color:var(--dim);font-size:0.75rem;}
  .back-btn{font-family:'Orbitron',sans-serif;font-size:0.75rem;letter-spacing:2px;padding:8px 16px;border-radius:6px;background:transparent;color:var(--dim);border:1px solid var(--card-border);text-decoration:none;}
  .game-wrap{position:relative;z-index:1;display:flex;flex-direction:column;align-items:center;min-height:100vh;padding:100px 20px 40px;}
  .game-title{font-family:'Orbitron',sans-serif;font-size:1.8rem;font-weight:700;color:var(--accent-red);margin-bottom:8px;letter-spacing:3px;}
  .game-sub{color:var(--dim);font-size:0.85rem;margin-bottom:30px;}
  .crash-container{background:var(--card-bg);border:1px solid rgba(255,68,68,0.15);border-radius:20px;padding:30px;max-width:700px;width:100%;box-shadow:0 0 60px rgba(255,68,68,0.05);}
  .graph-area{position:relative;background:rgba(0,0,0,0.3);border:1px solid var(--card-border);border-radius:12px;height:280px;margin-bottom:24px;overflow:hidden;}
  canvas#crashCanvas{position:absolute;inset:0;width:100%;height:100%;}
  .multiplier-display{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;flex-direction:column;}
  .mult-value{font-family:'Orbitron',sans-serif;font-size:3.5rem;font-weight:900;transition:color 0.3s;color:var(--accent-gold);}
  .mult-value.crashed{color:var(--accent-red);}
  .mult-value.cashed{color:#00ff88;}
  .mult-label{font-family:'JetBrains Mono',monospace;font-size:0.7rem;letter-spacing:3px;color:var(--dim);margin-top:4px;}
  .status-bar{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;padding:0 4px;}
  .status-badge{font-family:'JetBrains Mono',monospace;font-size:0.7rem;letter-spacing:2px;padding:6px 14px;border-radius:6px;text-transform:uppercase;}
  .status-badge.waiting{background:rgba(106,122,154,0.2);color:var(--dim);border:1px solid var(--card-border);}
  .status-badge.flying{background:rgba(245,200,66,0.15);color:var(--accent-gold);border:1px solid rgba(245,200,66,0.3);}
  .status-badge.crashed{background:rgba(255,68,68,0.15);color:var(--accent-red);border:1px solid rgba(255,68,68,0.3);}
  .status-badge.cashed{background:rgba(0,255,136,0.15);color:#00ff88;border:1px solid rgba(0,255,136,0.3);}
  .potential-win{font-family:'JetBrains Mono',monospace;font-size:0.85rem;color:var(--dim);}
  .potential-win span{color:var(--accent-gold);}
  .controls{display:flex;gap:12px;align-items:center;justify-content:center;flex-wrap:wrap;}
  .bet-control{display:flex;align-items:center;gap:8px;}
  .bet-label{font-size:0.75rem;color:var(--dim);}
  .bet-btn{width:32px;height:32px;border-radius:6px;border:1px solid var(--card-border);background:var(--card-bg);color:var(--star-white);cursor:pointer;font-size:1rem;}
  
  .main-btn{font-family:'Orbitron',sans-serif;font-size:0.9rem;font-weight:700;letter-spacing:2px;padding:14px 40px;border-radius:8px;border:none;cursor:pointer;transition:all 0.2s;min-width:160px;}
  .btn-start{background:linear-gradient(135deg,var(--accent-red),#cc0000);color:white;box-shadow:0 0 20px rgba(255,68,68,0.3);}
  .btn-start:hover:not(:disabled){transform:translateY(-2px);box-shadow:0 0 40px rgba(255,68,68,0.6);}
  .btn-cashout{background:linear-gradient(135deg,#00ff88,#00cc66);color:#000;box-shadow:0 0 20px rgba(0,255,136,0.3);animation:pulse 0.8s ease infinite;}
  @keyframes pulse{0%,100%{box-shadow:0 0 20px rgba(0,255,136,0.3)}50%{box-shadow:0 0 40px rgba(0,255,136,0.7)}}
  .btn-cashout:hover{transform:translateY(-2px);}
  .main-btn:disabled{opacity:0.4;cursor:not-allowed;transform:none;animation:none;}
  .history{margin-top:20px;border-top:1px solid var(--card-border);padding-top:16px;}
  .history-title{font-family:'JetBrains Mono',monospace;font-size:0.65rem;letter-spacing:3px;color:var(--dim);margin-bottom:10px;}
  .history-row{display:flex;gap:8px;flex-wrap:wrap;}
  .hist-item{font-family:'JetBrains Mono',monospace;font-size:0.75rem;padding:4px 10px;border-radius:4px;}
  .hist-item.low{background:rgba(255,68,68,0.15);color:#ff8888;}
  .hist-item.mid{background:rgba(245,200,66,0.15);color:var(--accent-gold);}
  .hist-item.high{background:rgba(0,255,136,0.15);color:#00ff88;}
  input.bet-amount {
    -moz-appearance: textfield;
    font-family: 'JetBrains Mono', monospace;
    font-size: 1rem;
    font-weight: 500;
    width: 90px;
    text-align: center;
    padding: 6px 0;
    border-radius: 6px;
    background: var(--card-bg2, rgba(245,200,66,0.08));
    border: 1px solid var(--bet-border, rgba(245,200,66,0.2));
    color: var(--bet-color, var(--accent-gold));
    outline: none;
  }
  input.bet-amount::-webkit-outer-spin-button,
  input.bet-amount::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
  input.bet-amount { --card-bg2: rgba(255,68,68,0.08); --bet-border: rgba(255,68,68,0.2); --bet-color: #ff4444; }
</style>
</head>
<body>
<div id="starfield"></div>
<nav>
  <a href="index.html" class="nav-logo">BUNZY<span>BETS</span></a>
  <div style="display:flex;gap:12px;align-items:center;">
    <a href="index.html" class="back-btn">← LOBBY</a>
    <a href="store.html" style="font-family:'Orbitron',sans-serif;font-size:0.75rem;letter-spacing:2px;padding:8px 16px;border-radius:6px;background:transparent;color:#e040fb;border:1px solid rgba(224,64,251,0.4);text-decoration:none;" onmouseover="this.style.background='rgba(224,64,251,0.1)'" onmouseout="this.style.background='transparent'">&#x1F6D2; STORE</a>
    <div id="active-perk-badge" style="display:none;font-family:JetBrains Mono,monospace;font-size:0.7rem;padding:6px 12px;border-radius:6px;background:rgba(224,64,251,0.15);border:1px solid rgba(224,64,251,0.3);color:#e040fb;"></div>
    <div class="nav-balance"><span class="label">CREDITS</span><span id="nav-balance">$10,000.00</span></div>
  </div>
</nav>
<div class="game-wrap">
  <div class="game-title">CRASH</div>
  <div class="game-sub">Cash out before the rocket crashes — or lose it all</div>
  <div class="crash-container">
    <div class="graph-area">
      <canvas id="crashCanvas"></canvas>
      <div class="multiplier-display">
        <div class="mult-value" id="mult-value">1.00×</div>
        <div class="mult-label" id="mult-label">WAITING</div>
      </div>
    </div>
    <div class="status-bar">
      <div class="status-badge waiting" id="status-badge">WAITING</div>
      <div class="potential-win" id="potential-win">Potential win: <span id="win-amount">$0</span></div>
    </div>
    <div class="controls">
      <div class="bet-control">
        <span class="bet-label">BET</span>
        <button class="bet-btn" onclick="changeBet(-10)">−</button>
        <input class="bet-amount" id="bet-display" type="number" min="1" max="100000" value="10" onchange="setBetDirect(this.value)">
        <button class="bet-btn" onclick="changeBet(10)">+</button>
      </div>
      <button class="main-btn btn-start" id="main-btn" onclick="startGame()">LAUNCH</button>
    </div>
    <div class="history">
      <div class="history-title">RECENT CRASHES</div>
      <div class="history-row" id="history-row"></div>
    </div>
  </div>
</div>
<script>
  let bet=10, gameState='idle', currentMult=1, crashPoint=1, animFrame=null, betPlaced=false, cashedOut=false;
  let graphPoints=[], history=[];

  const sf=document.getElementById('starfield');
  for(let i=0;i<150;i++){const s=document.createElement('div');s.className='star';const sz=Math.random()*2+0.5,mn=Math.random()*0.3+0.1;s.style.cssText=`width:${sz}px;height:${sz}px;left:${Math.random()*100}%;top:${Math.random()*100}%;--d:${Math.random()*4+2}s;--min:${mn};animation-delay:${Math.random()*4}s;`;sf.appendChild(s);}

  function getBalance(){return parseFloat(localStorage.getItem('bunzy_balance')||10000);}
  function setBalance(v){localStorage.setItem('bunzy_balance',v.toFixed(2));document.getElementById('nav-balance').textContent='$'+v.toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2});}
  function changeBet(d){
    if(typeof spinning !== 'undefined' && spinning) return;
    if(typeof rolling !== 'undefined' && rolling) return;
    if(typeof gameActive !== 'undefined' && gameActive) return;
    if(typeof phase !== 'undefined' && phase !== 'bet') return;
    if(typeof gameState !== 'undefined' && gameState !== 'idle') return;
    bet = Math.max(1, bet + d);
    document.getElementById('bet-display').value = bet;
    if(typeof updateOdds === 'function') updateOdds();
    if(typeof updatePotential === 'function') updatePotential();
  }
  function updatePotential(){document.getElementById('win-amount').textContent='$'+(bet*currentMult).toFixed(2);}

  function generateCrashPoint(){
    const r=Math.random();
    if(r<0.33)return 1+(Math.random()*0.5); // 33% crash below 1.5x
    if(r<0.6)return 1.5+(Math.random()*1.5); // 27% between 1.5-3x
    if(r<0.8)return 3+(Math.random()*7);     // 20% between 3-10x
    if(r<0.95)return 10+(Math.random()*40);  // 15% between 10-50x
    return 50+(Math.random()*950);            // 5% moonshot
  }

  const canvas=document.getElementById('crashCanvas');
  const ctx=canvas.getContext('2d');
  function resizeCanvas(){canvas.width=canvas.offsetWidth;canvas.height=canvas.offsetHeight;}
  resizeCanvas(); window.addEventListener('resize',resizeCanvas);

  function drawGraph(){
    resizeCanvas();
    ctx.clearRect(0,0,canvas.width,canvas.height);
    if(graphPoints.length<2)return;
    const maxMult=Math.max(crashPoint,currentMult,2);
    const scaleX=canvas.width/(graphPoints.length);
    const scaleY=(canvas.height-40)/(maxMult-1);
    const color=cashedOut?'#00ff88':gameState==='crashed'?'#ff4444':'#f5c842';
    ctx.beginPath();
    ctx.moveTo(0,canvas.height-40);
    graphPoints.forEach((m,i)=>{
      const x=i*scaleX;
      const y=canvas.height-40-(m-1)*scaleY;
      ctx.lineTo(x,y);
    });
    ctx.strokeStyle=color; ctx.lineWidth=3; ctx.stroke();
    // Fill
    ctx.lineTo(graphPoints.length*scaleX,canvas.height-40);
    ctx.lineTo(0,canvas.height-40);
    ctx.fillStyle=color.replace(')',',0.1)').replace('rgb','rgba').replace('#ff4444','rgba(255,68,68,0.1)').replace('#f5c842','rgba(245,200,66,0.1)').replace('#00ff88','rgba(0,255,136,0.1)');
    ctx.fill();
    // Rocket
    if(gameState==='flying'){
      const lx=(graphPoints.length-1)*scaleX;
      const ly=canvas.height-40-(currentMult-1)*scaleY;
      ctx.font='20px serif'; ctx.fillText('🚀',lx-10,ly+10);
    }
  }

  let startTime=null;
  function startGame(){
    const bal=getBalance();
    if(bal<bet){document.getElementById('mult-label').textContent='NOT ENOUGH CREDITS';return;}
    setBalance(bal-bet);
    if(typeof checkBroke === 'function' && checkBroke()) return;
    betPlaced=true; cashedOut=false;
    crashPoint=generateCrashPoint();
    currentMult=1; graphPoints=[1];
    gameState='flying';
    startTime=performance.now();
    document.getElementById('main-btn').className='main-btn btn-cashout';
    document.getElementById('main-btn').textContent='CASH OUT';
    document.getElementById('main-btn').onclick=cashOut;
    document.getElementById('mult-value').className='mult-value';
    setStatus('flying','FLYING');
    updatePotential();
    animate();
  }

  function animate(){
    const elapsed=(performance.now()-startTime)/1000;
    currentMult=Math.pow(Math.E, elapsed*0.6);
    graphPoints.push(currentMult);
    document.getElementById('mult-value').textContent=currentMult.toFixed(2)+'×';
    maybeMushroomGlitch('mult-value', currentMult.toFixed(2)+'×', currentMult*2, currentMult*8);
    updatePotential();
    drawGraph();
    if(currentMult>=crashPoint){crash();}
    else{animFrame=requestAnimationFrame(animate);}
  }

  function cashOut(){
    if(gameState!=='flying')return;
    cashedOut=true;
    cancelAnimationFrame(animFrame);
    const perk = (typeof getActivePerk === "function" ? getActivePerk() : null);
    const win = applyWinPerk(bet*currentMult, perk);
    setBalance(getBalance()+win);
    if(typeof consumePerkRound === "function") consumePerkRound();
    document.getElementById('mult-value').className='mult-value cashed';
    setStatus('cashed',`CASHED OUT @ ${currentMult.toFixed(2)}×`);
    document.getElementById('mult-label').textContent=`+$${win.toFixed(2)}!`;
    endRound();
  }

  function crash(){
    cancelAnimationFrame(animFrame);
    gameState='crashed';
    currentMult=crashPoint;
    graphPoints.push(crashPoint);
    document.getElementById('mult-value').textContent=crashPoint.toFixed(2)+'×';
    document.getElementById('mult-value').className='mult-value crashed';
    setStatus('crashed','CRASHED!');
    document.getElementById('mult-label').textContent=cashedOut?'You cashed out in time!':'Rocket down!';
    addHistory(crashPoint);
    drawGraph();
    endRound();
  }

  function endRound(){
    gameState='idle';
    document.getElementById('main-btn').className='main-btn btn-start';
    document.getElementById('main-btn').textContent='LAUNCH';
    document.getElementById('main-btn').onclick=startGame;
  }

  function setStatus(type,text){
    const el=document.getElementById('status-badge');
    el.className='status-badge '+type; el.textContent=text;
  }

  function addHistory(mult){
    history.unshift(mult); if(history.length>10)history.pop();
    const row=document.getElementById('history-row'); row.innerHTML='';
    history.forEach(m=>{
      const el=document.createElement('div');
      const cls=m<2?'low':m<10?'mid':'high';
      el.className='hist-item '+cls; el.textContent=m.toFixed(2)+'×';
      row.appendChild(el);
    });
  }

  setBalance(getBalance()); updatePotential();

  function setBetDirect(v) {
    const parsed = parseInt(v);
    bet = (!isNaN(parsed) && parsed >= 1) ? parsed : 1;
    document.getElementById('bet-display').value = bet;
    if(typeof updateOdds === 'function') updateOdds();
    if(typeof updatePotential === 'function') updatePotential();
  }

</script>
</body>
</html>
