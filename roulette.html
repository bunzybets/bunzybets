<html lang="en"><head><meta http-equiv="Content-Type" content="text/html; charset=UTF-8">

<title>Roulette — BunzyBets Gaming</title>
<link href="./roulette_files/css2" rel="stylesheet">
<style>
  :root{--void:#03020a;--accent-gold:#f5c842;--accent-cyan:#00e5ff;--accent-magenta:#e040fb;--star-white:#e8f0ff;--dim:#6a7a9a;--card-bg:rgba(255,255,255,0.04);--card-border:rgba(255,255,255,0.08);}
  *{margin:0;padding:0;box-sizing:border-box;}
  body{background:var(--void);color:var(--star-white);font-family:'Exo 2',sans-serif;min-height:100vh;}
  #starfield{position:fixed;inset:0;z-index:0;pointer-events:none;background:radial-gradient(ellipse at 60% 30%,#1a0530 0%,transparent 60%),var(--void);}
  .star{position:absolute;border-radius:50%;background:white;animation:twinkle var(--d) ease-in-out infinite;}
  @keyframes twinkle{0%,100%{opacity:var(--min)}50%{opacity:1}}
  nav{position:fixed;top:0;left:0;right:0;z-index:100;display:flex;align-items:center;justify-content:space-between;padding:16px 40px;background:rgba(3,2,10,0.8);backdrop-filter:blur(20px);border-bottom:1px solid rgba(0,229,255,0.1);}
  .nav-logo{font-family:'Orbitron',sans-serif;font-weight:900;font-size:1.2rem;color:var(--accent-gold);text-decoration:none;letter-spacing:2px;}
  .nav-logo span{color:var(--accent-cyan);}
  .nav-balance{display:flex;align-items:center;gap:8px;font-family:'JetBrains Mono',monospace;font-size:0.9rem;color:var(--accent-gold);background:rgba(245,200,66,0.08);border:1px solid rgba(245,200,66,0.2);padding:8px 16px;border-radius:8px;}
  .nav-balance .label{color:var(--dim);font-size:0.75rem;}
  .back-btn{font-family:'Orbitron',sans-serif;font-size:0.75rem;letter-spacing:2px;padding:8px 16px;border-radius:6px;background:transparent;color:var(--dim);border:1px solid var(--card-border);text-decoration:none;transition:all 0.2s;}
  .back-btn:hover{color:var(--star-white);}
  .game-wrap{position:relative;z-index:1;display:flex;flex-direction:column;align-items:center;min-height:100vh;padding:100px 20px 40px;}
  .game-title{font-family:'Orbitron',sans-serif;font-size:1.8rem;font-weight:700;color:var(--accent-magenta);margin-bottom:8px;letter-spacing:3px;}
  .game-sub{color:var(--dim);font-size:0.85rem;margin-bottom:30px;}
  .roulette-container{display:flex;flex-direction:column;align-items:center;gap:30px;width:100%;max-width:800px;}
  /* Wheel */
  .wheel-wrap{position:relative;width:220px;height:220px;}
  canvas#wheelCanvas{border-radius:50%;box-shadow:0 0 40px rgba(224,64,251,0.3);}
  .wheel-pointer{position:absolute;top:-10px;left:50%;transform:translateX(-50%);width:0;height:0;border-left:10px solid transparent;border-right:10px solid transparent;border-top:24px solid var(--accent-gold);filter:drop-shadow(0 0 6px var(--accent-gold));}
  .wheel-result{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-family:'Orbitron',sans-serif;font-size:1.6rem;font-weight:700;pointer-events:none;}
  /* Betting board */
  .bet-board{background:var(--card-bg);border:1px solid rgba(224,64,251,0.15);border-radius:16px;padding:20px;width:100%;}
  .board-title{font-family:'JetBrains Mono',monospace;font-size:0.7rem;letter-spacing:3px;color:var(--dim);margin-bottom:16px;text-align:center;}

  /* Main board layout: number grid + outside bets side by side */
  .board-layout{display:flex;gap:8px;align-items:stretch;margin-bottom:16px;}

  /* Number grid: 0 on left, then 3 rows of 12 numbers */
  .number-section{display:flex;gap:4px;flex:1;min-width:0;}
  .zero-cell{display:flex;align-items:center;justify-content:center;background:rgba(0,140,60,0.4);color:#88ff88;border-radius:6px;font-size:0.8rem;font-weight:700;cursor:pointer;transition:all 0.15s;border:2px solid transparent;writing-mode:vertical-rl;text-orientation:mixed;padding:8px 6px;min-width:32px;}
  .zero-cell:hover,.zero-cell.selected{border-color:var(--accent-gold);box-shadow:0 0 10px rgba(245,200,66,0.4);}
  .zero-cell.selected{background:rgba(245,200,66,0.2)!important;color:var(--accent-gold)!important;}

  /* 3 rows × 12 columns */
  .numbers-grid{display:grid;grid-template-columns:repeat(12,1fr);grid-template-rows:repeat(3,1fr);gap:4px;flex:1;}
  .num-cell{height:40px;border-radius:4px;display:flex;align-items:center;justify-content:center;font-size:0.72rem;font-weight:600;cursor:pointer;transition:all 0.15s;border:2px solid transparent;user-select:none;}
  .num-cell.red{background:rgba(160,20,20,0.6);color:#ffaaaa;}
  .num-cell.black{background:rgba(20,20,30,0.7);color:#bbb;}
  .num-cell:hover,.num-cell.selected{border-color:var(--accent-gold);box-shadow:0 0 8px rgba(245,200,66,0.4);}
  .num-cell.selected{background:rgba(245,200,66,0.2)!important;color:var(--accent-gold)!important;}

  /* Outside bets: 2 columns × 3 rows on the right */
  .outside-section{display:grid;grid-template-columns:1fr 1fr;grid-template-rows:repeat(3,1fr);gap:4px;min-width:160px;}
  .outside-btn{padding:8px 6px;border-radius:6px;border:1px solid var(--card-border);background:var(--card-bg);color:var(--star-white);cursor:pointer;font-family:'Exo 2',sans-serif;font-size:0.78rem;font-weight:600;transition:all 0.2s;text-align:center;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;}
  .outside-btn:hover,.outside-btn.selected{border-color:var(--accent-magenta);background:rgba(224,64,251,0.1);color:var(--accent-magenta);}
  .outside-btn span{font-family:'JetBrains Mono',monospace;font-size:0.6rem;color:var(--dim);}
  .outside-btn.selected span{color:rgba(224,64,251,0.7);}
  .controls{display:flex;gap:12px;align-items:center;justify-content:center;flex-wrap:wrap;}
  .bet-control{display:flex;align-items:center;gap:8px;}
  .bet-label{font-size:0.75rem;color:var(--dim);}
  .bet-btn{width:32px;height:32px;border-radius:6px;border:1px solid var(--card-border);background:var(--card-bg);color:var(--star-white);cursor:pointer;font-size:1rem;}
  
  .spin-btn{font-family:'Orbitron',sans-serif;font-size:0.9rem;font-weight:700;letter-spacing:2px;padding:14px 40px;border-radius:8px;border:none;cursor:pointer;background:linear-gradient(135deg,var(--accent-magenta),#9c00d4);color:white;transition:all 0.2s;box-shadow:0 0 20px rgba(224,64,251,0.3);}
  .spin-btn:hover:not(:disabled){transform:translateY(-2px);box-shadow:0 0 40px rgba(224,64,251,0.6);}
  .spin-btn:disabled{opacity:0.5;cursor:not-allowed;}
  .result-msg{font-family:'Orbitron',sans-serif;font-size:1rem;font-weight:700;text-align:center;min-height:32px;padding:8px;}
  .result-msg.win{color:var(--accent-gold);}
  .result-msg.lose{color:var(--dim);}
  .selected-bet-display{font-family:'JetBrains Mono',monospace;font-size:0.75rem;color:var(--dim);text-align:center;margin-bottom:8px;}
  input.bet-amount {
    -moz-appearance: textfield;
    font-family: 'JetBrains Mono', monospace;
    font-size: 1rem;
    font-weight: 500;
    width: 90px;
    text-align: center;
    padding: 6px 0;
    border-radius: 6px;
    background: var(--card-bg2, rgba(245,200,66,0.08));
    border: 1px solid var(--bet-border, rgba(245,200,66,0.2));
    color: var(--bet-color, var(--accent-gold));
    outline: none;
  }
  input.bet-amount::-webkit-outer-spin-button,
  input.bet-amount::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
  input.bet-amount { --card-bg2: rgba(224,64,251,0.08); --bet-border: rgba(224,64,251,0.2); --bet-color: #e040fb; }
</style>
</head>

<script>
  const RED_NUMS=[1,3,5,7,9,12,14,16,18,19,21,23,25,27,30,32,34,36];
  const NUMBERS=[0,...Array.from({length:36},(_,i)=>i+1)];
  let bet=10, selectedBet=null, spinning=false, wheelAngle=0;

  const sf=document.getElementById('starfield');
  for(let i=0;i<150;i++){const s=document.createElement('div');s.className='star';const sz=Math.random()*2+0.5,mn=Math.random()*0.3+0.1;s.style.cssText=`width:${sz}px;height:${sz}px;left:${Math.random()*100}%;top:${Math.random()*100}%;--d:${Math.random()*4+2}s;--min:${mn};animation-delay:${Math.random()*4}s;`;sf.appendChild(s);}

  function getBalance(){return parseFloat(localStorage.getItem('bunzy_balance')||10000);}
  function setBalance(v){localStorage.setItem('bunzy_balance',v.toFixed(2));document.getElementById('nav-balance').textContent='$'+v.toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2});}
  function changeBet(d){
    if(typeof spinning !== 'undefined' && spinning) return;
    if(typeof rolling !== 'undefined' && rolling) return;
    if(typeof gameActive !== 'undefined' && gameActive) return;
    if(typeof phase !== 'undefined' && phase !== 'bet') return;
    if(typeof gameState !== 'undefined' && gameState !== 'idle') return;
    bet = Math.max(1, bet + d);
    document.getElementById('bet-display').value = bet;
    if(typeof updateOdds === 'function') updateOdds();
    if(typeof updatePotential === 'function') updatePotential();
  }

  // Build number grid — 3 rows, col 1 = 1/2/3, col 2 = 4/5/6 ... col 12 = 34/35/36
  // Standard roulette layout: row1=3,6,9...36 row2=2,5,8...35 row3=1,4,7...34
  const grid=document.getElementById('number-grid');
  for(let row=3;row>=1;row--){
    for(let col=0;col<12;col++){
      const n = col*3 + row;
      const el=document.createElement('div');
      el.className='num-cell '+(RED_NUMS.includes(n)?'red':'black');
      el.textContent=n; el.id='num-'+n;
      el.onclick=(()=>{const num=n;return()=>selectNumber(num);})();
      grid.appendChild(el);
    }
  }

  function selectNumber(n){
    clearSelection();
    selectedBet={type:'number',value:n};
    document.getElementById('num-'+n)?.classList.add('selected');
    document.getElementById('selected-bet-display').textContent=`Bet: Number ${n} (pays 35:1)`;
  }
  function selectOutside(type){
    clearSelection();
    selectedBet={type:'outside',value:type};
    document.getElementById('ob-'+type)?.classList.add('selected');
    const labels={red:'Red',black:'Black',odd:'Odd',even:'Even',low:'1–18',high:'19–36'};
    document.getElementById('selected-bet-display').textContent=`Bet: ${labels[type]} (pays 1:1)`;
  }
  function clearSelection(){
    selectedBet=null;
    document.querySelectorAll('.num-cell.selected,.outside-btn.selected').forEach(el=>el.classList.remove('selected'));
  }

  // Draw wheel
  const canvas=document.getElementById('wheelCanvas');
  const ctx=canvas.getContext('2d');
  const segAngle=(2*Math.PI)/37;
  function drawWheel(angle=0){
    ctx.clearRect(0,0,220,220);
    const cx=110,cy=110,r=105;
    NUMBERS.forEach((n,i)=>{
      const a=angle+i*segAngle-Math.PI/2;
      ctx.beginPath(); ctx.moveTo(cx,cy);
      ctx.arc(cx,cy,r,a,a+segAngle);
      ctx.closePath();
      ctx.fillStyle=n===0?'#006400':RED_NUMS.includes(n)?'#8b0000':'#1a1a1a';
      ctx.fill(); ctx.strokeStyle='rgba(255,255,255,0.15)'; ctx.lineWidth=1; ctx.stroke();
      ctx.save(); ctx.translate(cx,cy); ctx.rotate(a+segAngle/2);
      ctx.textAlign='right'; ctx.fillStyle='rgba(255,255,255,0.9)'; ctx.font='bold 9px Exo 2';
      ctx.fillText(n,r-6,4); ctx.restore();
    });
    // Center circle
    ctx.beginPath(); ctx.arc(cx,cy,18,0,Math.PI*2);
    ctx.fillStyle='#03020a'; ctx.fill();
    ctx.strokeStyle='rgba(224,64,251,0.4)'; ctx.lineWidth=2; ctx.stroke();
  }
  drawWheel();

  function spinWheel(){
    if(spinning)return;
    if(!selectedBet){document.getElementById('result-msg').textContent='Select a bet first!';document.getElementById('result-msg').className='result-msg lose';return;}
    const bal=getBalance();
    if(bal<bet){document.getElementById('result-msg').textContent='Not enough credits!';return;}
    setBalance(bal-bet);
    if(typeof checkBroke === 'function' && checkBroke()) return;
    spinning=true;
    document.getElementById('spin-btn').disabled=true;
    document.getElementById('result-msg').textContent='';
    document.getElementById('wheel-result').textContent='';

    const resultIdx=Math.floor(Math.random()*37);
    const resultNum=NUMBERS[resultIdx];
    const targetAngle=-(resultIdx*segAngle)+Math.PI/2-segAngle/2;
    const spins=6+Math.random()*4;
    const totalRotation=spins*Math.PI*2+targetAngle-wheelAngle;
    const duration=4000;
    const start=performance.now();
    const startAngle=wheelAngle;

    function animate(now){
      const elapsed=now-start;
      const progress=Math.min(elapsed/duration,1);
      const ease=1-Math.pow(1-progress,4);
      wheelAngle=startAngle+totalRotation*ease;
      drawWheel(wheelAngle);
      if(progress<1){requestAnimationFrame(animate);}
      else{
        wheelAngle=startAngle+totalRotation;
        drawWheel(wheelAngle);
        showRouletteResult(resultNum);
      }
    }
    requestAnimationFrame(animate);
  }

  function showRouletteResult(n){
    document.getElementById('wheel-result').textContent=n;
    const isRed=RED_NUMS.includes(n), isBlack=n>0&&!isRed;
    let won=false, payout=0;
    if(selectedBet.type==='number'){won=selectedBet.value===n;payout=bet*36;}
    else{
      const v=selectedBet.value;
      if(v==='red')won=isRed;
      else if(v==='black')won=isBlack;
      else if(v==='odd')won=n>0&&n%2===1;
      else if(v==='even')won=n>0&&n%2===0;
      else if(v==='low')won=n>=1&&n<=18;
      else if(v==='high')won=n>=19&&n<=36;
      payout=bet*2;
    }
    const msg=document.getElementById('result-msg');
    const perk = getActivePerk();
    if(won){
      setBalance(getBalance()+Math.floor(applyWinPerk(payout, perk)));
      msg.textContent=`${n}! You win $${Math.floor(applyWinPerk(payout,perk))}!`;
      msg.className='result-msg win';
    } else {
      msg.textContent=`${n}. Better luck next spin.`;
      msg.className='result-msg lose';
    }
    consumePerkRound();
    spinning=false;
    document.getElementById('spin-btn').disabled=false;
  }

  setBalance(getBalance());

  function setBetDirect(v) {
    const parsed = parseInt(v);
    bet = (!isNaN(parsed) && parsed >= 1) ? parsed : 1;
    document.getElementById('bet-display').value = bet;
    if(typeof updateOdds === 'function') updateOdds();
    if(typeof updatePotential === 'function') updatePotential();
  }

</script>
