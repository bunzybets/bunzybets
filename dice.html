<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dice — BunzyBets Gaming</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700;900&family=Exo+2:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{--void:#03020a;--accent-gold:#f5c842;--accent-cyan:#00e5ff;--accent-orange:#ffa028;--star-white:#e8f0ff;--dim:#6a7a9a;--card-bg:rgba(255,255,255,0.04);--card-border:rgba(255,255,255,0.08);}
  *{margin:0;padding:0;box-sizing:border-box;}
  body{background:var(--void);color:var(--star-white);font-family:'Exo 2',sans-serif;min-height:100vh;}
  #starfield{position:fixed;inset:0;z-index:0;pointer-events:none;background:radial-gradient(ellipse at 70% 40%,#1a0a00 0%,transparent 60%),var(--void);}
  .star{position:absolute;border-radius:50%;background:white;animation:twinkle var(--d) ease-in-out infinite;}
  @keyframes twinkle{0%,100%{opacity:var(--min)}50%{opacity:1}}
  nav{position:fixed;top:0;left:0;right:0;z-index:100;display:flex;align-items:center;justify-content:space-between;padding:16px 40px;background:rgba(3,2,10,0.8);backdrop-filter:blur(20px);border-bottom:1px solid rgba(0,229,255,0.1);}
  .nav-logo{font-family:'Orbitron',sans-serif;font-weight:900;font-size:1.2rem;color:var(--accent-gold);text-decoration:none;letter-spacing:2px;}
  .nav-logo span{color:var(--accent-cyan);}
  .nav-balance{display:flex;align-items:center;gap:8px;font-family:'JetBrains Mono',monospace;font-size:0.9rem;color:var(--accent-gold);background:rgba(245,200,66,0.08);border:1px solid rgba(245,200,66,0.2);padding:8px 16px;border-radius:8px;}
  .nav-balance .label{color:var(--dim);font-size:0.75rem;}
  .back-btn{font-family:'Orbitron',sans-serif;font-size:0.75rem;letter-spacing:2px;padding:8px 16px;border-radius:6px;background:transparent;color:var(--dim);border:1px solid var(--card-border);text-decoration:none;}
  .game-wrap{position:relative;z-index:1;display:flex;flex-direction:column;align-items:center;min-height:100vh;padding:100px 20px 40px;}
  .game-title{font-family:'Orbitron',sans-serif;font-size:1.8rem;font-weight:700;color:var(--accent-orange);margin-bottom:8px;letter-spacing:3px;}
  .game-sub{color:var(--dim);font-size:0.85rem;margin-bottom:30px;}
  .dice-container{background:var(--card-bg);border:1px solid rgba(255,160,40,0.15);border-radius:20px;padding:30px;max-width:600px;width:100%;box-shadow:0 0 60px rgba(255,160,40,0.05);}
  /* Big dice display */
  .dice-display{display:flex;justify-content:center;gap:30px;margin-bottom:30px;}
  .big-die{width:100px;height:100px;border-radius:16px;background:rgba(255,255,255,0.05);border:2px solid var(--card-border);display:flex;align-items:center;justify-content:center;font-family:'Orbitron',sans-serif;font-size:2.5rem;font-weight:900;transition:all 0.3s;}
  .big-die.rolling{animation:roll 0.1s linear infinite;}
  .big-die.win{border-color:var(--accent-orange);box-shadow:0 0 30px rgba(255,160,40,0.4);color:var(--accent-orange);}
  .big-die.lose{border-color:rgba(255,60,60,0.4);color:#ff6060;}
  @keyframes roll{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
  .roll-total{text-align:center;font-family:'Orbitron',sans-serif;font-size:2rem;font-weight:700;margin-bottom:8px;min-height:50px;color:var(--accent-gold);}
  /* Slider */
  .target-section{margin-bottom:24px;}
  .target-label{font-family:'JetBrains Mono',monospace;font-size:0.7rem;letter-spacing:3px;color:var(--dim);text-align:center;margin-bottom:12px;}
  .target-display{text-align:center;margin-bottom:16px;}
  .target-value{font-family:'Orbitron',sans-serif;font-size:2.5rem;font-weight:900;color:var(--accent-orange);}
  .target-sub{font-size:0.75rem;color:var(--dim);margin-top:4px;}
  input[type=range]{width:100%;-webkit-appearance:none;height:8px;border-radius:4px;background:linear-gradient(to right,rgba(255,160,40,0.3),rgba(255,160,40,0.3));outline:none;margin-bottom:8px;}
  input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:24px;height:24px;border-radius:50%;background:var(--accent-orange);cursor:pointer;box-shadow:0 0 10px rgba(255,160,40,0.5);}
  .range-labels{display:flex;justify-content:space-between;font-family:'JetBrains Mono',monospace;font-size:0.65rem;color:var(--dim);}
  /* Mode toggle */
  .mode-toggle{display:flex;gap:8px;justify-content:center;margin-bottom:24px;}
  .mode-btn{padding:10px 28px;border-radius:8px;border:1px solid var(--card-border);background:var(--card-bg);color:var(--dim);cursor:pointer;font-family:'Orbitron',sans-serif;font-size:0.75rem;letter-spacing:1px;transition:all 0.2s;}
  .mode-btn.active{border-color:var(--accent-orange);color:var(--accent-orange);background:rgba(255,160,40,0.1);}
  /* Odds display */
  .odds-row{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:24px;}
  .odds-item{text-align:center;background:rgba(255,255,255,0.02);padding:12px;border-radius:8px;border:1px solid var(--card-border);}
  .odds-val{font-family:'Orbitron',sans-serif;font-size:1.1rem;font-weight:700;color:var(--accent-orange);}
  .odds-label{font-size:0.7rem;color:var(--dim);margin-top:4px;letter-spacing:1px;}
  /* Result */
  .result-msg{text-align:center;font-family:'Orbitron',sans-serif;font-size:1rem;font-weight:700;min-height:36px;padding:8px;margin-bottom:16px;}
  .result-msg.win{color:var(--accent-orange);}
  .result-msg.lose{color:var(--dim);}
  /* Controls */
  .controls{display:flex;gap:12px;align-items:center;justify-content:center;flex-wrap:wrap;}
  .bet-control{display:flex;align-items:center;gap:8px;}
  .bet-label{font-size:0.75rem;color:var(--dim);}
  .bet-btn{width:32px;height:32px;border-radius:6px;border:1px solid var(--card-border);background:var(--card-bg);color:var(--star-white);cursor:pointer;font-size:1rem;}
  
  .roll-btn{font-family:'Orbitron',sans-serif;font-size:0.9rem;font-weight:700;letter-spacing:2px;padding:14px 40px;border-radius:8px;border:none;cursor:pointer;background:linear-gradient(135deg,var(--accent-orange),#cc7000);color:#000;transition:all 0.2s;box-shadow:0 0 20px rgba(255,160,40,0.3);}
  .roll-btn:hover:not(:disabled){transform:translateY(-2px);box-shadow:0 0 40px rgba(255,160,40,0.6);}
  .roll-btn:disabled{opacity:0.5;cursor:not-allowed;}
  input.bet-amount {
    -moz-appearance: textfield;
    font-family: 'JetBrains Mono', monospace;
    font-size: 1rem;
    font-weight: 500;
    width: 90px;
    text-align: center;
    padding: 6px 0;
    border-radius: 6px;
    background: var(--card-bg2, rgba(245,200,66,0.08));
    border: 1px solid var(--bet-border, rgba(245,200,66,0.2));
    color: var(--bet-color, var(--accent-gold));
    outline: none;
  }
  input.bet-amount::-webkit-outer-spin-button,
  input.bet-amount::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
  input.bet-amount { --card-bg2: rgba(255,160,40,0.08); --bet-border: rgba(255,160,40,0.2); --bet-color: #ffa028; }
</style>
</head>
<body>
<nav>
  <a href="index.html" class="nav-logo">BUNZY<span>BETS</span></a>
  <div style="display:flex;gap:12px;align-items:center;">
    <a href="index.html" class="back-btn">← LOBBY</a>
    <a href="store.html" style="font-family:'Orbitron',sans-serif;font-size:0.75rem;letter-spacing:2px;padding:8px 16px;border-radius:6px;background:transparent;color:#e040fb;border:1px solid rgba(224,64,251,0.4);text-decoration:none;" onmouseover="this.style.background='rgba(224,64,251,0.1)'" onmouseout="this.style.background='transparent'">&#x1F6D2; STORE</a>
    <div id="active-perk-badge" style="display:none;font-family:JetBrains Mono,monospace;font-size:0.7rem;padding:6px 12px;border-radius:6px;background:rgba(224,64,251,0.15);border:1px solid rgba(224,64,251,0.3);color:#e040fb;"></div>
    <div class="nav-balance"><span class="label">CREDITS</span><span id="nav-balance">$10,000</span></div>
  </div>
</nav>
<script src="space-bg.js"></script>
<div class="game-wrap">
  <div class="game-title">DICE</div>
  <div class="game-sub">Set your target, pick over or under, and roll</div>
  <div class="dice-container">
    <div class="dice-display">
      <div class="big-die" id="die1">🎲</div>
      <div class="big-die" id="die2">🎲</div>
    </div>
    <div class="roll-total" id="roll-total"></div>
    <div class="result-msg" id="result-msg">Set your target and roll</div>
    <div class="target-section">
      <div class="target-label">TARGET NUMBER</div>
      <div class="target-display">
        <div class="target-value" id="target-value">7</div>
        <div class="target-sub" id="target-sub">Roll 2–12</div>
      </div>
      <input type="range" id="target-slider" min="2" max="12" value="7" oninput="updateTarget(this.value)">
      <div class="range-labels"><span>2</span><span>12</span></div>
    </div>
    <div class="mode-toggle">
      <button class="mode-btn active" id="btn-over" onclick="setMode('over')">OVER</button>
      <button class="mode-btn" id="btn-under" onclick="setMode('under')">UNDER</button>
    </div>
    <div class="odds-row">
      <div class="odds-item"><div class="odds-val" id="win-chance">-</div><div class="odds-label">WIN CHANCE</div></div>
      <div class="odds-item"><div class="odds-val" id="multiplier">-</div><div class="odds-label">MULTIPLIER</div></div>
      <div class="odds-item"><div class="odds-val" id="payout">-</div><div class="odds-label">PAYOUT</div></div>
    </div>
    <div class="controls">
      <div class="bet-control">
        <span class="bet-label">BET</span>
        <button class="bet-btn" onclick="changeBet(-5)">−</button>
        <input class="bet-amount" id="bet-display" type="number" min="1" max="100000" value="10" onchange="setBetDirect(this.value)">
        <button class="bet-btn" onclick="changeBet(5)">+</button>
      </div>
      <button class="roll-btn" id="roll-btn" onclick="rollDice()">ROLL</button>
    </div>
  </div>
</div>
<script>
  let bet=10, target=7, mode='over', rolling=false;

  const sf=document.getElementById('starfield');
  for(let i=0;i<150;i++){const s=document.createElement('div');s.className='star';const sz=Math.random()*2+0.5,mn=Math.random()*0.3+0.1;s.style.cssText=`width:${sz}px;height:${sz}px;left:${Math.random()*100}%;top:${Math.random()*100}%;--d:${Math.random()*4+2}s;--min:${mn};animation-delay:${Math.random()*4}s;`;sf.appendChild(s);}

  function getBalance(){const raw=localStorage.getItem('bunzy_balance');if(!raw)return 10000;return Math.floor(parseFloat(String(raw).replace(/,/g,''))||10000);}
  function setBalance(v){localStorage.setItem('bunzy_balance',v);document.getElementById('nav-balance').textContent='$'+v.toLocaleString('en-US',{minimumFractionDigits:0,maximumFractionDigits:0});}
  function changeBet(d){
    if(typeof spinning !== 'undefined' && spinning) return;
    if(typeof rolling !== 'undefined' && rolling) return;
    if(typeof gameActive !== 'undefined' && gameActive) return;
    if(typeof phase !== 'undefined' && phase !== 'bet') return;
    if(typeof gameState !== 'undefined' && gameState !== 'idle') return;
    bet = Math.max(1, bet + d);
    document.getElementById('bet-display').value = bet;
    if(typeof updateOdds === 'function') updateOdds();
    if(typeof updatePotential === 'function') updatePotential();
  }

  // Probability table for 2d6
  const PROBS={2:1,3:2,4:3,5:4,6:5,7:6,8:5,9:4,10:3,11:2,12:1};
  function getWinChance(){
    let count=0;
    for(let n=2;n<=12;n++){
      if(mode==='over'&&n>target)count+=PROBS[n];
      if(mode==='under'&&n<target)count+=PROBS[n];
    }
    return count/36;
  }

  function updateOdds(){
    const chance=getWinChance();
    const mult=chance>0?0.97/chance:0;
    document.getElementById('win-chance').textContent=(chance*100).toFixed(1)+'%';
    document.getElementById('multiplier').textContent=mult+'×';
    document.getElementById('payout').textContent='$'+(bet*mult);
  }

  function updateTarget(v){
    target=parseInt(v);
    document.getElementById('target-value').textContent=target;
    document.getElementById('target-sub').textContent=mode==='over'?`Roll higher than ${target}`:`Roll lower than ${target}`;
    updateOdds();
  }

  function setMode(m){
    mode=m;
    document.getElementById('btn-over').className='mode-btn'+(m==='over'?' active':'');
    document.getElementById('btn-under').className='mode-btn'+(m==='under'?' active':'');
    document.getElementById('target-sub').textContent=mode==='over'?`Roll higher than ${target}`:`Roll lower than ${target}`;
    updateOdds();
  }

  function rollDice(){
    if(rolling)return;
    const bal=getBalance();
    if(bal<bet){document.getElementById('result-msg').textContent='Not enough credits!';document.getElementById('result-msg').className='result-msg lose';return;}
    setBalance(bal-bet);
    if(typeof checkBroke === 'function' && checkBroke()) return;
    rolling=true;
    document.getElementById('roll-btn').disabled=true;
    document.getElementById('result-msg').textContent='';
    document.getElementById('roll-total').textContent='';
    const d1=document.getElementById('die1'),d2=document.getElementById('die2');
    d1.className='big-die rolling'; d2.className='big-die rolling';
    const diceEmoji=['⚀','⚁','⚂','⚃','⚄','⚅'];
    let ticks=0;
    const interval=setInterval(()=>{
      d1.textContent=diceEmoji[Math.floor(Math.random()*6)];
      d2.textContent=diceEmoji[Math.floor(Math.random()*6)];
      ticks++;
      if(ticks>=12){
        clearInterval(interval);
        const r1=Math.floor(Math.random()*6)+1;
        const r2=Math.floor(Math.random()*6)+1;
        const total=r1+r2;
        d1.textContent=diceEmoji[r1-1]; d2.textContent=diceEmoji[r2-1];
        const won=(mode==='over'&&total>target)||(mode==='under'&&total<target);
        d1.className='big-die '+(won?'win':'lose');
        d2.className='big-die '+(won?'win':'lose');
        document.getElementById('roll-total').textContent=total;
        const chance=getWinChance();
        const mult=chance>0?0.97/chance:0;
        const msg=document.getElementById('result-msg');
        const perk = (typeof getActivePerk === "function" ? getActivePerk() : null);
        if(won){
          const win=Math.floor(applyWinPerk(bet*mult, perk));
          setBalance(getBalance()+win);
          msg.textContent=`${total}! You win $${win}!`;
          msg.className='result-msg win';
        } else {
          msg.textContent=`${total}. No win.`;
          msg.className='result-msg lose';
        }
        if(typeof consumePerkRound === "function") consumePerkRound();
        rolling=false;
        document.getElementById('roll-btn').disabled=false;
      }
    },80);
  }

  updateTarget(7); updateOdds(); setBalance(getBalance());

  function setBetDirect(v) {
    const parsed = parseInt(v);
    bet = (!isNaN(parsed) && parsed >= 1) ? parsed : 1;
    document.getElementById('bet-display').value = bet;
    if(typeof updateOdds === 'function') updateOdds();
    if(typeof updatePotential === 'function') updatePotential();
  }

</script>
</body>
</html>
